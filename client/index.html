<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ZUNO GLASS | Óculos Esportivos de Alta Performance</title>
    <meta name="description" content="Óculos esportivos de alta performance para atletas. Tecnologia ótica avançada, lentes fotocromáticas e design aerodinâmico. Descubra a coleção ZUNO GLASS." />
    <meta name="keywords" content="óculos esportivos, óculos de performance, lentes fotocromáticas, ZUNO GLASS, óculos para corrida, óculos ciclismo, proteção UV" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=3" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png?v=3" />
    <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192x192.png?v=3" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="/images/logo-zuno-white.png" as="image" />
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,400;0,700;1,400&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }
      #splash-screen img {
        width: 160px;
        height: auto;
        object-fit: contain;
        animation: zuno-pulse 1.4s ease-in-out infinite;
        /* sem filtro - PNG já é branco com fundo transparente */
      }
      @keyframes zuno-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
    </style>
  </head>

  <body>
    <!-- Splash screen shown while React loads -->
    <div id="splash-screen">
      <img
        src="/images/logo-zuno-white.png"
        alt="ZUNO"
      />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash screen once React has mounted
      window.addEventListener('load', function () {
        var splash = document.getElementById('splash-screen');
        if (!splash) return;
        // Give React a moment to paint, then fade out
        setTimeout(function () {
          splash.style.opacity = '0';
          setTimeout(function () {
            splash.style.display = 'none';
          }, 400);
        }, 200);
      });
    </script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
